name: Deploy to alvis-server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify data directories exist
        run: |
          if [ ! -d "/var/lib/capitalpay" ]; then
            echo "💡 Creating directory..."
            sudo mkdir -p /var/lib/capitalpay
            sudo chown -R $USER:$USER /var/lib/capitalpay
          fi
          sudo mkdir -p /var/lib/capitalpay/uploads
          sudo chown 1001:1001 /var/lib/capitalpay/uploads
          echo "✅ Data directories verified"

      - name: Remove development override file
        run: |
          rm -f docker-compose.override.yml

      - name: Create .env file from secrets
        run: |
          echo 'NODE_ENV=production' > .env
          echo 'DATA_PATH=/var/lib/capitalpay' >> .env
          echo 'POSTGRES_PORT=5437' >> .env
          echo 'APP_PORT=3008' >> .env
          echo "POSTGRES_USER=\"${{ secrets.POSTGRES_USER }}\"" >> .env
          echo "POSTGRES_PASSWORD=\"${{ secrets.POSTGRES_PASSWORD }}\"" >> .env
          echo "POSTGRES_DB=\"${{ secrets.POSTGRES_DB }}\"" >> .env
          echo "NEXTAUTH_SECRET=\"${{ secrets.NEXTAUTH_SECRET }}\"" >> .env
          echo "NEXTAUTH_URL=\"${{ secrets.NEXTAUTH_URL }}\"" >> .env
          echo "ADMIN_EMAIL=\"${{ secrets.ADMIN_EMAIL }}\"" >> .env
          echo "ADMIN_PASSWORD=\"${{ secrets.ADMIN_PASSWORD }}\"" >> .env

      - name: Detect changes requiring rebuild
        id: changes
        run: |
          CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r HEAD)
          echo "Changed files:"
          echo "$CHANGED_FILES"

          REBUILD=false
          if echo "$CHANGED_FILES" | grep -qE "(package.*\.json|Dockerfile|prisma/)"; then
            REBUILD=true
          fi

          echo "rebuild=$REBUILD" >> $GITHUB_OUTPUT
          echo "Full rebuild needed: $REBUILD"

      - name: Deploy with Docker Compose
        run: |
          echo "🚀 Starting deployment..."
          docker compose down || true

          if [ "${{ steps.changes.outputs.rebuild }}" == "true" ]; then
            echo "📦 Full rebuild (dependencies/Dockerfile/schema changed)"
            docker compose build --no-cache app
            docker compose --profile tools build --no-cache migrator
          else
            echo "📦 Using cache"
            docker compose build app
            docker compose --profile tools build migrator
          fi

          echo "🚀 Starting database..."
          docker compose up -d db
          sleep 5

          echo "🔄 Running database migrations..."
          docker compose --profile tools run --rm migrator npx prisma migrate deploy
          echo "✅ Migrations completed"

          echo "🚀 Starting app..."
          docker compose up -d app
          docker compose ps
          echo "✅ Deployment completed"

      - name: Wait for app to be ready
        run: |
          echo "⏳ Waiting for services..."
          for i in {1..30}; do
            if curl -s http://localhost:3008 > /dev/null 2>&1; then
              echo "✅ App is ready at port 3008"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Seed database (first deploy only)
        run: |
          echo "🌱 Checking if seed is needed..."
          ADMIN_COUNT=$(docker compose --profile tools run --rm migrator node -e "
            const { PrismaClient } = require('@prisma/client');
            const p = new PrismaClient();
            p.user.count({ where: { role: 'ADMIN' } }).then(c => { console.log(c); p.\$disconnect(); });
          " 2>/dev/null || echo "0")

          if [ "$ADMIN_COUNT" == "0" ]; then
            echo "🌱 First deploy - running seed..."
            docker compose --profile tools run --rm migrator npx prisma db seed || true
          else
            echo "✅ Database already seeded"
          fi
