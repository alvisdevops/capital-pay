# Docker Compose override para desarrollo local
# Se usa automaticamente con docker compose up
# En produccion NO se copia este archivo al servidor

services:
  db:
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${POSTGRES_USER:-capitalpay}:${POSTGRES_PASSWORD:-capitalpay123}@db:5432/${POSTGRES_DB:-capitalpay}?schema=public
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-change-me-in-production}
      - NEXTAUTH_URL=http://localhost:${APP_PORT:-3008}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@capitalcars.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Admin123*}
      - WATCHPACK_POLLING=true
    entrypoint: []
    command: sh -c "npm install && npx prisma generate && npx prisma migrate deploy && npx prisma db seed && npm run dev"

volumes:
  postgres_data:
  node_modules:
